<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <h1><img src="imagens/calculator-svgrepo-com.svg" alt="imagem-de-calculadora">Calculadora de Perímetro</h1>
    </header>

    <main>
        <section id="selecao">

            <p>Escolha um dos poligonos</p>

            <div id="formas">

                <label class="frame" for="quadrado"><span class="circulo"></span><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <rect x="4" y="4" width="16" height="16" rx="2" stroke="" fill="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></rect> </g></svg><input class="forma" type="radio" name="forma" value="quadrado" id="quadrado" checked></label>
                
                <label class="frame" for="triangulo"><span class="circulo"></span><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M4.2433 17.6513L10.5859 5.67095C11.0445 4.80456 11.2739 4.37136 11.5798 4.22973C11.8463 4.10637 12.1535 4.10637 12.42 4.22973C12.726 4.37136 12.9553 4.80456 13.414 5.67094L19.7565 17.6513C20.1668 18.4263 20.372 18.8138 20.3305 19.13C20.2943 19.4059 20.1448 19.6543 19.9179 19.8154C19.6579 19.9999 19.2194 19.9999 18.3425 19.9999H5.65737C4.78044 19.9999 4.34198 19.9999 4.08198 19.8154C3.85505 19.6543 3.70551 19.4059 3.66932 19.13C3.62785 18.8138 3.833 18.4263 4.2433 17.6513Z" stroke="" fill="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg><input class="forma" type="radio" name="forma" value="triangulo" id="triangulo"></label>

                <label class="frame" for="retangulo"><span class="circulo"></span><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <rect x="3" y="5" width="18" height="14" rx="2" stroke="" fill="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></rect> </g></svg><input class="forma" type="radio" name="forma" value="retangulo" id="retangulo"></label>

            </div>
            
            <div id="visuForma" class="forma-quadrado"></div>

        </section>

        <section id="dados">

            <p>Fórmula</p>
            <div id="formula">
                <p id="prevFormula">Perímetro = lado A x 4</p>
            </div>

            

            <div id="valores">

                <div class="input-group">
                    <label for="ladoA">Tamanho do lado A</label>
                    <input placeholder=" " type="number" name="ladoA" id="ladoA" min="1">
                </div>

                <div id="inputLadoB" class="input-group">
                    <label for="ladoB">Tamanho do lado B</label>
                    <input placeholder=" " type="number" name="ladoB" id="ladoB" min="1">
                </div>
                
                <button id="botao">Calcular</button>

            </div>

        </section>

        <section id="resultado"> 
            <p id="res">O perimetro é de:</p>
        </section>
        
    </main>

    <script src="script.js" defer></script>
</body>
</html>
